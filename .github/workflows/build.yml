name: GDevelop Build and Release

on:
  push:
    branches:
      - master
      - stable
      - 'experimental-build/**'
  pull_request:
    branches:
      - master
      - stable

env:
  NODE_VERSION: '20.x'
  PYTHON_VERSION: '3.12'

jobs:
  # Build GDevelop.js WebAssembly library (for Linux and macOS)
  build-gdevelop-js:
    name: Build GDevelop.js (WebAssembly)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt install -y cmake

      - name: Install Emscripten
        run: |
          git clone https://github.com/juj/emsdk.git
          cd emsdk
          ./emsdk install 3.1.21
          ./emsdk activate 3.1.21
          cd ..

      - name: Cache GDevelop.js dependencies
        uses: actions/cache@v4
        with:
          path: |
            GDevelop.js/node_modules
            ~/.npm
          key: gdevelop-js-${{ runner.os }}-${{ hashFiles('GDevelop.js/package-lock.json') }}
          restore-keys: |
            gdevelop-js-${{ runner.os }}-

      - name: Install GDevelop.js dependencies
        run: |
          cd GDevelop.js
          npm install

      - name: Build GDevelop.js
        run: |
          cd GDevelop.js
          source ../emsdk/emsdk_env.sh
          npm run build
          npm test -- --runInBand

      - name: Upload GDevelop.js artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gdevelop-js-binaries
          path: Binaries/embuild/GDevelop.js
          retention-days: 7

  # Build for Windows (使用预编译的 GDevelop.js)
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: build-gdevelop-js
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: |
            newIDE/node_modules
            GDJS/node_modules
            GDevelop.js/node_modules
            ~/.npm
          key: windows-${{ hashFiles('newIDE/package-lock.json', 'GDJS/package-lock.json', 'GDevelop.js/package-lock.json') }}
          restore-keys: |
            windows-

      - name: Download GDevelop.js artifacts
        uses: actions/download-artifact@v4
        with:
          name: gdevelop-js-binaries
          path: Binaries/embuild/GDevelop.js

      - name: Verify GDevelop.js download
        run: |
          if (!(Test-Path "Binaries/embuild/GDevelop.js")) {
            Write-Error "GDevelop.js binaries not found!"
            exit 1
          }
          Write-Host "GDevelop.js binaries downloaded successfully"

      - name: Install IDE dependencies
        env:
          REQUIRES_EXACT_LIBGD_JS_VERSION: true
        run: |
          cd newIDE
          npm install
          npm run import-resources

      - name: Verify libGD.js exists
        run: |
          if (!(Test-Path "newIDE/app/public/libGD.js")) {
            Write-Error "libGD.js not found after import-resources!"
            exit 1
          }
          Write-Host "libGD.js exists successfully"

      - name: Build Windows NSIS installer
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          ESIGNER_USER_NAME: ${{ secrets.ESIGNER_USER_NAME }}
          ESIGNER_USER_PASSWORD: ${{ secrets.ESIGNER_USER_PASSWORD }}
          ESIGNER_USER_TOTP: ${{ secrets.ESIGNER_USER_TOTP }}
        run: |
          cd newIDE/electron-app
          npm run build -- --win nsis --publish=never

      - name: Build Windows AppX (unsigned)
        run: |
          cd newIDE/electron-app
          npm run build -- --win appx --publish=never

      - name: Clean Windows binaries
        run: |
          if (Test-Path "newIDE/electron-app/dist/win-unpacked") {
            Remove-Item -Recurse -Force "newIDE/electron-app/dist/win-unpacked"
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: newIDE/electron-app/dist/*
          retention-days: 30

      - name: Deploy to S3 (if configured)
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/stable'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
        run: |
          pip install --quiet --upgrade awscli
          aws s3 sync newIDE/electron-app/dist s3://gdevelop-releases/${{ github.ref_name }}/commit/${{ github.sha }}/
          aws s3 sync newIDE/electron-app/dist s3://gdevelop-releases/${{ github.ref_name }}/latest/

  # Build for macOS
  build-macos:
    name: Build macOS
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Rosetta
        run: softwareupdate --install-rosetta --agree-to-license

      - name: Install system dependencies
        run: |
          brew install cmake

      - name: Install AWS CLI
        run: |
          curl "https://awscli.amazonaws.com/AWSCLIV2.pkg" -o "AWSCLIV2.pkg"
          sudo installer -pkg AWSCLIV2.pkg -target /

      - name: Install Emscripten
        run: |
          git clone https://github.com/juj/emsdk.git
          cd emsdk
          ./emsdk install 3.1.21
          ./emsdk activate 3.1.21
          cd ..

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: |
            newIDE/node_modules
            GDJS/node_modules
            GDevelop.js/node_modules
            ~/.npm
          key: macos-${{ hashFiles('newIDE/package-lock.json', 'GDJS/package-lock.json', 'GDevelop.js/package-lock.json') }}
          restore-keys: |
            macos-

      - name: Install GDevelop.js dependencies
        run: |
          cd GDevelop.js
          npm install

      - name: Build GDevelop.js
        run: |
          cd GDevelop.js
          source ../emsdk/emsdk_env.sh
          npm run build
          npm test

      - name: Install IDE dependencies
        run: |
          cd newIDE
          npm install

      - name: Build macOS app
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          NODE_OPTIONS: --max-old-space-size=7168
        run: |
          cd newIDE/electron-app
          CI=false npm run build -- --mac --publish=never

      - name: Clean macOS app bundle
        run: |
          rm -rf "newIDE/electron-app/dist/mac-universal/GDevelop 5.app"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: newIDE/electron-app/dist/*
          retention-days: 30

      - name: Deploy to S3 (if configured)
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/stable'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
        run: |
          for i in {1..7}; do
            aws s3 sync newIDE/electron-app/dist s3://gdevelop-releases/${{ github.ref_name }}/commit/${{ github.sha }}/ && break
            echo "Retry $i failed... retrying in 10 seconds"
            sleep 10
          done
          if [ $i -eq 7 ]; then
            echo "All retries for deployment failed!" >&2
            exit 1
          fi
          aws s3 sync newIDE/electron-app/dist s3://gdevelop-releases/${{ github.ref_name }}/latest/

  # Build for Linux
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: build-gdevelop-js
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt install -y icnsutils graphicsmagick rsync

      - name: Install AWS CLI
        run: |
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip -q awscliv2.zip
          sudo ./aws/install

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: |
            newIDE/node_modules
            GDJS/node_modules
            GDevelop.js/node_modules
            ~/.npm
          key: linux-${{ hashFiles('newIDE/package-lock.json', 'GDJS/package-lock.json', 'GDevelop.js/package-lock.json') }}
          restore-keys: |
            linux-

      - name: Download GDevelop.js artifacts
        uses: actions/download-artifact@v4
        with:
          name: gdevelop-js-binaries
          path: Binaries/embuild/GDevelop.js

      - name: Verify GDevelop.js download
        run: |
          if [ ! -d "Binaries/embuild/GDevelop.js" ]; then
            echo "Error: GDevelop.js binaries not found!"
            exit 1
          fi
          echo "GDevelop.js binaries downloaded successfully"

      - name: Install dependencies
        env:
          REQUIRES_EXACT_LIBGD_JS_VERSION: true
        run: |
          cd newIDE
          npm install
          npm run import-resources

      - name: Build Linux app
        env:
          NODE_OPTIONS: --max-old-space-size=7168
        run: |
          cd newIDE/electron-app
          npm run build -- --linux --publish=never

      - name: Clean Linux binaries
        run: |
          rm -rf newIDE/electron-app/dist/linux-unpacked
          rm -rf newIDE/electron-app/dist/linux-arm64-unpacked

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: newIDE/electron-app/dist/*
          retention-days: 30

      - name: Deploy to S3 (if configured)
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/stable'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
        run: |
          aws s3 sync newIDE/electron-app/dist s3://gdevelop-releases/${{ github.ref_name }}/commit/${{ github.sha }}/
          aws s3 sync newIDE/electron-app/dist s3://gdevelop-releases/${{ github.ref_name }}/latest/

  # Additional debug build with sanitizers (master/stable only)
  build-debug-sanitizers:
    name: Build with Sanitizers and Clang-Tidy
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/stable' || startsWith(github.ref, 'refs/heads/experimental-build/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt install -y cmake

      - name: Install clang-tidy v19
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 19
          sudo apt install -y clang-tidy-19

      - name: Install Emscripten
        run: |
          git clone https://github.com/juj/emsdk.git
          cd emsdk
          ./emsdk install 3.1.21
          ./emsdk activate 3.1.21
          cd ..

      - name: Cache GDevelop.js dependencies
        uses: actions/cache@v4
        with:
          path: |
            GDevelop.js/node_modules
            ~/.npm
          key: gdevelop-js-debug-${{ runner.os }}-${{ hashFiles('GDevelop.js/package-lock.json') }}
          restore-keys: |
            gdevelop-js-debug-${{ runner.os }}-

      - name: Install GDevelop.js dependencies
        run: |
          cd GDevelop.js
          npm install

      - name: Build GDevelop.js with debug-sanitizers
        run: |
          cd GDevelop.js
          source ../emsdk/emsdk_env.sh
          npm run build -- --variant=debug-sanitizers

      - name: Run clang-tidy
        run: |
          cd GDevelop.js
          npm run lint

      - name: Run tests
        run: |
          cd GDevelop.js
          npm run test -- --maxWorkers=4

      - name: Upload debug artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gdevelop-js-debug
          path: Binaries/embuild/GDevelop.js
          retention-days: 7

      - name: Deploy to S3 (if configured)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
        run: |
          aws s3 sync Binaries/embuild/GDevelop.js s3://gdevelop-gdevelop.js/${{ github.ref_name }}/variant/debug-sanitizers/commit/${{ github.sha }}/
