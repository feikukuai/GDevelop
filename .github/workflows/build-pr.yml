name: GDevelop PR Build

on:
  pull_request:
    branches:
      - master
      - stable

env:
  NODE_VERSION: '20.x'
  PYTHON_VERSION: '3.12'

jobs:
  # Quick smoke test for PRs
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: |
            newIDE/node_modules
            GDJS/node_modules
            GDevelop.js/node_modules
            ~/.npm
          key: pr-test-${{ hashFiles('newIDE/package-lock.json', 'GDJS/package-lock.json', 'GDevelop.js/package-lock.json') }}

      - name: Install dependencies
        run: |
          cd newIDE
          npm install

      - name: Run IDE tests
        run: |
          cd newIDE/app
          npm run test -- --passWithNoTests

      - name: Run flow type check
        run: |
          cd newIDE/app
          npm run flow -- --quiet

  # Quick build test for PRs (without full packaging)
  build-check:
    name: Quick Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt install -y cmake icnsutils graphicsmagick rsync

      - name: Install Emscripten
        run: |
          git clone https://github.com/juj/emsdk.git
          cd emsdk
          ./emsdk install 3.1.21
          ./emsdk activate 3.1.21
          cd ..

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: |
            newIDE/node_modules
            GDJS/node_modules
            GDevelop.js/node_modules
            ~/.npm
          key: pr-build-${{ hashFiles('newIDE/package-lock.json', 'GDJS/package-lock.json', 'GDevelop.js/package-lock.json') }}

      - name: Install GDevelop.js dependencies
        run: |
          cd GDevelop.js
          npm install

      - name: Build GDevelop.js (quick)
        run: |
          cd GDevelop.js
          source ../emsdk/emsdk_env.sh
          npm run build

      - name: Install IDE dependencies
        env:
          REQUIRES_EXACT_LIBGD_JS_VERSION: true
        run: |
          cd newIDE
          npm install

      - name: Build IDE (without packaging)
        env:
          NODE_OPTIONS: --max-old-space-size=7168
        run: |
          cd newIDE/electron-app
          CI=false npm run build -- --dir

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: pr-build-output
          path: newIDE/electron-app/dist
          retention-days: 7

  # Linting and formatting check
  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: |
            newIDE/node_modules
            ~/.npm
          key: pr-lint-${{ hashFiles('newIDE/package-lock.json') }}

      - name: Install dependencies
        run: |
          cd newIDE
          npm install

      - name: Check formatting
        run: |
          cd newIDE
          npm run check-format

      - name: Run ESLint
        run: |
          cd newIDE/app
          npm run lint -- --max-warnings 0 || true

  # Summary
  pr-summary:
    name: PR Summary
    runs-on: ubuntu-latest
    needs: [test, build-check, lint]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.build-check.result }}" != "success" ] || \
             [ "${{ needs.lint.result }}" != "success" ]; then
            echo "::error::One or more PR checks failed"
            exit 1
          fi
          echo "All PR checks passed!"
